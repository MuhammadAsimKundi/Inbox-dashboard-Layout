<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox</title>
    <link rel="stylesheet" href="./css/style.css">
    <!-- google fonts -->
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"> -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600&display=swap"
        rel="stylesheet">
    <!-- font awesones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>
    <div class="parent">

        <!-- sidebar here -->
        <div class="sideBar">
            <div class="red-square"></div>
            <ul>
                <li><i class="fa-solid fa-gauge-high"></i></li>
                <li><i class="fa-regular fa-user"></i></li>
                <li><i class="fa-solid fa-briefcase"></i></li>
                <li><i class="fa-solid fa-user-group"></i></li>
                <li><i class="fa-solid fa-phone"></i></li>
                <li><i class="fa-regular fa-file-lines"></i></li>
                <li><i class="fa-solid fa-robot"></i></li>
                <li><i class="fa-solid fa-phone-volume"></i></li>
                <li><i class="fa-solid fa-gear"></i></li>
            </ul>
        </div>

        <!-- Main content here -->
        <div class="main">

            <!-- navbar -->
            <nav class="nav">
                <ul class="nav-left"></ul>
                <ul class="nav-center">
                    <li>Dashboard</li>
                    <li>Marketing</li>
                    <li><i class="fa-solid fa-dollar-sign"></i>&nbsp;&nbsp;&nbsp;&nbsp; Sales</li>
                    <li>GMB</li>
                    <li>Automation</li>
                </ul>
                <ul class="nav-right">
                    <li><i class="fa-regular fa-bell"></i></li>
                    <li><i class="fa-brands fa-google"></i></li>
                </ul>
            </nav>

            <!-- parent div for top row and three colums -->
            <div class="chat-Parent">
                <!-- div for small buttons alike for h3-contactCenter, credits and date etc -->
                <div class="credits-data">
                    <p>Contact Center</p>
                    <!-- credits data buttons-alike here -->
                    <div class="credits">
                        <p>Credits &nbsp;&nbsp;</p>
                        <div>
                            <span>¢</span>
                            <p>69,583,322,187</p>
                        </div>
                        <!-- <p><span>¢</span> 69,583,322,187</p> -->
                        <p><i class="fa-solid fa-calendar-days " style="color: #8c45ff; font-size: 1.2rem;"></i> Jan 02, 2019 - Feb 15, 2020</p>
                    </div>
                
                </div>

                <!-- side bar that contains all the platforms buttons like wattsapp, contacts, messages, inbox etc -->
                <ul class="chat-sideBar">
                    <li>A</li>
                    <li>B</li>
                    <li>C</li>
                    <li>D</li>
                    <li>E</li>
                    <hr style="width: 100%;">
                    <li>F</li>
                    <li>G</li>
                    <li>H</li>
                </ul>

                <!-- div that contains search-bar and all the recents chats -->
                <div class="recentChats">
                    
                </div>

                <!-- div that has the open chat -->
                <div class="openChat">

                </div>
            </div>


        </div>
    </div>
</body>

</html>
